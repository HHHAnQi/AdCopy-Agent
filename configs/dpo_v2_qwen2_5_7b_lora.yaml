model_name_or_path: Qwen/Qwen2.5-7B-Instruct
adapter_name_or_path: outputs/models/qwen2_5_7b_adgen_sft

stage: dpo
do_train: true
finetuning_type: lora
lora_target: all

dataset: adgen_dpo_v2
dataset_dir: data
template: qwen
cutoff_len: 1024
max_samples: 5000
overwrite_cache: true
preprocessing_num_workers: 4

output_dir: outputs/models/qwen2_5_7b_adgen_dpo_v2
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true

per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-5
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.03

bf16: true
quantization_bit: 4
upcast_layernorm: true
gradient_checkpointing: true

pref_beta: 0.1
